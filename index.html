<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cable & Internet Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --paper:#F5F3ED;
    --ink:#1C2430;
    --ink-soft:#5B6472;
    --surface:#FFFFFF;
    --border:#E3DFD3;
    --accent:#24406B;
    --accent-hover:#1B3050;
    --accent-soft:#E7ECF4;
    --green:#1F9D74;
    --green-soft:#E4F5EE;
    --amber:#C6821F;
    --amber-soft:#FBF0DC;
    --red:#C24338;
    --red-soft:#FBE7E5;
    --radius:10px;
    --shadow:0 1px 2px rgba(28,36,48,.06),0 6px 16px rgba(28,36,48,.05);
    --font-display:'Space Grotesk','Noto Sans Tamil',sans-serif;
    --font-body:'Inter','Noto Sans Tamil',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:var(--font-display);letter-spacing:-0.01em;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  #root{min-height:100vh;display:flex;}

  /* ---------- Sidebar (desktop) ---------- */
  .sidebar{
    width:224px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
  .brand-mark{height:32px;width:auto;flex-shrink:0;object-fit:contain;}
  .brand-name{font-family:var(--font-display);font-weight:700;font-size:15.5px;line-height:1.2;color:var(--ink);}
  .nav{display:flex;flex-direction:column;gap:3px;flex:1;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:8px;border:none;
    background:transparent;color:var(--ink-soft);font-size:14.5px;font-weight:600;text-align:left;width:100%;
    transition:background .12s ease,color .12s ease;
  }
  .nav-item svg{flex-shrink:0;}
  .nav-item:hover{background:var(--paper);color:var(--ink);}
  .nav-item.active{background:var(--accent-soft);color:var(--accent);}
  .lang-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:10px;}
  .lang-toggle button{flex:1;padding:9px 4px;border:none;background:var(--surface);color:var(--ink-soft);font-weight:700;font-size:13px;}
  .lang-toggle button.active{background:var(--accent);color:#fff;}

  /* ---------- Mobile top bar & bottom nav ---------- */
  .mobile-top{display:none;position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);
    padding:12px 14px;align-items:center;justify-content:space-between;}
  .bottom-nav{display:none;}

  main{flex:1;min-width:0;padding:28px 32px 60px;max-width:1080px;}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .page-head h1{font-size:23px;margin:0 0 4px;}
  .page-sub{color:var(--ink-soft);font-size:13.5px;margin:0;}
  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:8px;border:1px solid transparent;
    font-weight:700;font-size:14px;background:var(--accent);color:#fff;white-space:nowrap;
  }
  .btn:hover{background:var(--accent-hover);}
  .btn.secondary{background:var(--surface);border-color:var(--border);color:var(--ink);}
  .btn.secondary:hover{background:var(--paper);}
  .btn.danger{background:var(--red-soft);color:var(--red);}
  .btn.danger:hover{background:#f6d8d5;}
  .btn.block{width:100%;justify-content:center;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px;}
  .icon-btn{border:1px solid var(--border);background:var(--surface);border-radius:7px;padding:6px 8px;color:var(--ink-soft);}
  .icon-btn:hover{color:var(--ink);background:var(--paper);}

  /* ---------- Cards / stats ---------- */
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat-label{font-size:12px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .stat-value{font-family:var(--font-display);font-size:26px;font-weight:700;}
  .stat-value.green{color:var(--green);} .stat-value.amber{color:var(--amber);} .stat-value.red{color:var(--red);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card-pad{padding:18px;}
  .section-title{font-size:14.5px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}

  .banner{display:flex;gap:10px;align-items:flex-start;background:var(--amber-soft);border:1px solid #EAD3A0;color:#7A5716;
    border-radius:var(--radius);padding:13px 15px;margin-bottom:20px;font-size:13.5px;line-height:1.5;}
  .banner button{margin-top:6px;}

  /* ---------- Lists / tables ---------- */
  .list{display:flex;flex-direction:column;gap:10px;}
  .row-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);}
  .row-main{flex:1;min-width:0;}
  .row-title{font-weight:700;font-size:14.5px;margin-bottom:2px;}
  .row-sub{font-size:12.5px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:4px 10px;}
  .row-actions{display:flex;gap:6px;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:700;}
  .pill.green{background:var(--green-soft);color:var(--green);}
  .pill.amber{background:var(--amber-soft);color:var(--amber);}
  .pill.red{background:var(--red-soft);color:var(--red);}
  .pill.grey{background:#EDEBE4;color:var(--ink-soft);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);
    padding:9px 10px;border-bottom:1px solid var(--border);}
  td{padding:10px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  .empty-state{text-align:center;padding:44px 20px;color:var(--ink-soft);}
  .empty-state .big{font-size:34px;margin-bottom:8px;}

  /* ---------- Form ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--paper);color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent);outline-offset:1px;background:var(--surface);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .radio-group{display:flex;gap:8px;}
  .radio-opt{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .radio-opt.checked{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(28,36,48,.45);display:none;align-items:flex-start;justify-content:center;
    padding:40px 16px;overflow-y:auto;z-index:100;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:440px;box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal-head{padding:18px 20px 4px;display:flex;align-items:center;justify-content:space-between;}
  .modal-head h3{margin:0;font-size:17px;}
  .modal-close{border:none;background:none;font-size:20px;color:var(--ink-soft);padding:4px 8px;}
  .modal-body{padding:14px 20px 4px;}
  .modal-foot{padding:14px 20px 20px;display:flex;gap:10px;}
  .modal-foot .btn{flex:1;}

  /* ---------- Collect / Receipt ---------- */
  .customer-search{position:relative;}
  .suggest-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);
    border-radius:8px;box-shadow:var(--shadow);max-height:220px;overflow-y:auto;z-index:5;}
  .suggest-item{padding:9px 12px;font-size:13.5px;border-bottom:1px solid var(--border);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover{background:var(--paper);}
  .selected-customer{background:var(--accent-soft);border:1px solid #C4D2E8;border-radius:8px;padding:12px 14px;margin-bottom:14px;}
  .selected-customer .name{font-weight:700;font-size:15px;}
  .selected-customer .meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}

  .receipt{max-width:340px;margin:0 auto;}
  .receipt-notch{height:16px;background:radial-gradient(circle 8px at 8px 8px,var(--paper) 8px,transparent 8px) repeat-x;background-size:16px 16px;}
  .receipt-body{background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:22px 22px 8px;text-align:center;}
  .receipt-biz{font-family:var(--font-display);font-weight:700;font-size:15px;}
  .receipt-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .receipt-dash{border-top:1.5px dashed var(--border);margin:16px 0;}
  .receipt-amt{font-family:var(--font-mono);font-size:30px;font-weight:700;color:var(--accent);}
  .receipt-line{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);padding:3px 0;text-align:left;}
  .receipt-line span:last-child{color:var(--ink);font-weight:600;}
  #qrHolder{display:flex;justify-content:center;margin:14px 0 4px;}
  .receipt-foot{padding:0 22px 22px;text-align:center;font-size:11px;color:var(--ink-soft);}

  /* ---------- Manage tabs ---------- */
  .subtabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .subtab{padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--ink-soft);}
  .subtab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:flex-end;}
  .filter-item label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
  .filter-item input,.filter-item select{padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface);}

  .signal{display:inline-flex;align-items:flex-end;gap:2px;height:14px;}
  .signal i{display:block;width:3px;border-radius:1px;background:#D8D4C8;}
  .signal i:nth-child(1){height:5px;} .signal i:nth-child(2){height:9px;} .signal i:nth-child(3){height:14px;}

  @media(max-width:900px){
    .grid-stats{grid-template-columns:1fr 1fr;}
    .field-row{grid-template-columns:1fr;}
  }
  @media(max-width:760px){
    .sidebar{display:none;}
    .mobile-top{display:flex;}
    main{padding:18px 14px 90px;}
    .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);
      z-index:20;padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
    .bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
      color:var(--ink-soft);font-size:10.5px;font-weight:700;padding:5px 2px;border-radius:8px;}
    .bottom-nav button.active{color:var(--accent);}
    .grid-stats{grid-template-columns:1fr 1fr;}
    .page-head{flex-direction:column;}
    .page-head .btn{width:100%;justify-content:center;}
  }
  @media print{
    .sidebar,.mobile-top,.bottom-nav,.no-print{display:none !important;}
    main{padding:0;max-width:100%;}
    body{background:#fff;}
  }
</style>
</head>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle"></h3><button class="modal-close" id="modalCloseBtn">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>

<script>
/* ================= DATA LAYER ================= */
const STORAGE_KEY='cable-billing-data-v1';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr=()=>new Date().toISOString().slice(0,10);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function defaultData(){
  return{
    settings:{businessName:'',payeeName:'',upiId:'',language:'en'},
    areas:[],employees:[],packages:[],customers:[],payments:[],tickets:[]
  };
}
let DATA=defaultData();

/* Embedded starter customer list (imported 18-Jul-2026) */
const SEED_CUSTOMERS_TEXT="";
const SEED_VERSION="v1";
const SEED_PACKAGES_TEXT="";
const SEED_PKG_VERSION="v1";
const SEED_EMPLOYEES_TEXT="";
const SEED_EMP_VERSION="v1";

async function loadData(){
  try{
    const res=await window.storage.get(STORAGE_KEY,false);
    if(res&&res.value){DATA=JSON.parse(res.value);}
  }catch(e){ /* no data yet, keep defaults */ }
  if(!DATA.meta)DATA.meta={};
  if(!DATA.tickets)DATA.tickets=[];
  if(DATA.meta.seedVersion!==SEED_VERSION&&typeof SEED_CUSTOMERS_TEXT==='string'&&SEED_CUSTOMERS_TEXT.length>0){
    bulkImportCore(SEED_CUSTOMERS_TEXT);
    DATA.meta.seedVersion=SEED_VERSION;
    await saveData();
  }
  if(DATA.meta.pkgSeedVersion!==SEED_PKG_VERSION&&typeof SEED_PACKAGES_TEXT==='string'&&SEED_PACKAGES_TEXT.length>0){
    bulkPkgImportCore(SEED_PACKAGES_TEXT);
    DATA.meta.pkgSeedVersion=SEED_PKG_VERSION;
    await saveData();
  }
  if(!DATA.meta.msoRenameV1){
    DATA.packages.forEach(p=>{
      if(p.name.includes('(ACV)'))p.name=p.name.replace('(ACV)','(SCV)');
      if(p.name.includes('(VK DIGITAL)'))p.name=p.name.replace('(VK DIGITAL)','(GTPL)');
    });
    DATA.meta.msoRenameV1=true;
    await saveData();
  }
  if(!DATA.meta.msoRenameV2){
    DATA.packages.forEach(p=>{
      if(p.name.includes('(TCCL)'))p.name=p.name.replace('(TCCL)','(GTPL)');
      if(p.name.includes('(ACV)'))p.name=p.name.replace('(ACV)','(SCV)');
    });
    DATA.meta.msoRenameV2=true;
    await saveData();
  }
  if(!DATA.meta.bizNameSeeded){
    if(!DATA.settings.businessName)DATA.settings.businessName='Megadhoodh Cable';
    DATA.meta.bizNameSeeded=true;
    await saveData();
  }
  if(DATA.meta.empSeedVersion!==SEED_EMP_VERSION&&typeof SEED_EMPLOYEES_TEXT==='string'&&SEED_EMPLOYEES_TEXT.length>0){
    bulkEmpImportCore(SEED_EMPLOYEES_TEXT);
    DATA.meta.empSeedVersion=SEED_EMP_VERSION;
    await saveData();
  }
  render();
}
let saving=false;
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY,JSON.stringify(DATA),false); }
  catch(e){ console.error('save failed',e); }
}

function signalIcon(level){ // level: 3 green,1 amber,0 red/grey

  const c3=level>=3?'var(--green)':'#D8D4C8';
  return `<span class="signal"><i style="background:${c1}"></i><i style="background:${c2}"></i><i style="background:${c3}"></i></span>`;
}

/* ================= HELPERS (data lookups) ================= */
const getArea=(id)=>DATA.areas.find(a=>a.id===id);
const getPackage=(id)=>DATA.packages.find(p=>p.id===id);
const getEmployee=(id)=>DATA.employees.find(e=>e.id===id);
const getCustomer=(id)=>DATA.customers.find(c=>c.id===id);
function fmtMoney(n){return '\u20B9'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});}
function fmtDate(s){ if(!s) return '-'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString(lang()==='ta'?'ta-IN':'en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function monthKey(s){return s.slice(0,7);}
function isPaidThisMonth(cust){
  const mk=monthKey(todayStr());
  const pkg=getPackage(cust.packageId);
  const price=pkg?Number(pkg.price):0;
  const paid=DATA.payments.filter(p=>p.customerId===cust.id&&monthKey(p.date)===mk).reduce((s,p)=>s+Number(p.amount),0);
  return price>0? paid>=price : paid>0;
}
function lastPaymentDate(custId){
  const list=DATA.payments.filter(p=>p.customerId===custId).sort((a,b)=>b.date.localeCompare(a.date));
  return list.length?list[0].date:null;
}
function waNumber(phone){
  let d=String(phone||'').replace(/\D/g,'');
  if(d.length===10)d='91'+d;
  return d;
}
function openWhatsApp(phone,message){
  const num=waNumber(phone);
  if(!num){alert(t('noPhoneWarn'));return;}
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(message),'_blank');
}
function openSMS(phone,message){
  if(!phone){alert(t('noPhoneWarn'));return;}
  window.open('sms:'+phone+'?body='+encodeURIComponent(message),'_blank');
}
function buildStatementMessage(cust){
  const biz=DATA.settings.businessName||t('appName');
  const pkg=getPackage(cust.packageId);
  const bal=Number(cust.openingBalance||0);
  const lp=lastPaymentDate(cust.id);
  let msg=biz+'\n\n'+t('name')+': '+cust.name+'\n';
  if(pkg)msg+=t('statementPackage')+': '+pkg.name+' ('+fmtMoney(pkg.price)+t('month')+')\n';
  msg+=t('statementBalance')+': '+fmtMoney(bal)+'\n';
  if(lp)msg+=t('statementLastPayment')+': '+fmtDate(lp)+'\n';
  if(DATA.settings.upiId)msg+='\nUPI: '+DATA.settings.upiId;
  return msg;
}
function buildReceiptMessage(cust,amount,dateVal){
  const biz=DATA.settings.businessName||t('appName');
  return biz+'\n\n'+t('name')+': '+cust.name+'\n'+t('amount')+': '+fmtMoney(amount)+'\n'+t('date')+': '+fmtDate(dateVal)+'\n\n'+t('paymentSaved');
}

/* ================= MODAL ================= */
function openModal(title,bodyHtml,footHtml){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  document.getElementById('modalFoot').innerHTML=footHtml;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',(e)=>{if(e.target.id==='overlay')closeModal();});

/* ================= RENDER: SHELL ================= */
function render(){
  const root=document.getElementById('root');
  root.innerHTML=`
    <div class="mobile-top">
      <div class="brand"><img src="${BRAND_LOGO}" class="brand-mark" alt="logo"><span class="brand-name">${esc(DATA.settings.businessName||t('appName'))}</span></div>
      ${langToggleHtml()}
    </div>
    <aside class="sidebar">
      <div class="brand"><img src="${BRAND_LOGO}" class="brand-mark" alt="logo"><span class="brand-name">${esc(DATA.settings.businessName||t('appName'))}</span></div>
      <nav class="nav">
        ${navItem('home',t('home'))}
        ${navItem('customers',t('customers'))}
        ${navItem('collect',t('collect'))}
        ${navItem('tickets',t('tickets'))}
        ${navItem('reports',t('reports'))}
        ${navItem('manage',t('manage'))}
      </nav>
      ${langToggleHtml()}
    </aside>
    <main id="main"></main>
    <nav class="bottom-nav">
      ${bottomItem('home',t('home'))}
      ${bottomItem('customers',t('customers'))}
      ${bottomItem('collect',t('collect'))}
      ${bottomItem('tickets',t('tickets'))}
      ${bottomItem('reports',t('reports'))}
      ${bottomItem('manage',t('manage'))}
    </nav>
  `;
  bindNav();
  renderMain();
}
function navItem(id,label){return `<button class="nav-item ${TAB===id?'active':''}" data-tab="${id}">${ICONS[id]}<span>${esc(label)}</span></button>`;}
function bottomItem(id,label){return `<button class="${TAB===id?'active':''}" data-tab="${id}">${ICONS[id]}<span>${esc(label)}</span></button>`;}
function langToggleHtml(){
  return `<div class="lang-toggle">
    <button data-lang="en" class="${lang()==='en'?'active':''}">EN</button>
    <button data-lang="ta" class="${lang()==='ta'?'active':''}">\u0BA4\u0BAE\u0BBF\u0BB4\u0BCD</button>
  </div>`;
}
function bindNav(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{TAB=b.getAttribute('data-tab');QR_SHOWN=false;LAST_SAVED_PAYMENT=null;render();}));
  document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>{DATA.settings.language=b.getAttribute('data-lang');saveData();render();}));
}

function renderMain(){
  const main=document.getElementById('main');
  if(TAB==='home')main.innerHTML=renderHome();
  else if(TAB==='customers')main.innerHTML=renderCustomers();
  else if(TAB==='collect')main.innerHTML=renderCollect();
  else if(TAB==='tickets')main.innerHTML=renderTickets();
  else if(TAB==='reports')main.innerHTML=renderReports();
  else if(TAB==='manage')main.innerHTML=renderManage();
  bindMainEvents();
}

/* ================= HOME ================= */
function renderHome(){
  const totalCustomers=DATA.customers.length;
  const active=DATA.customers.filter(c=>c.status==='active');
  const mk=monthKey(todayStr());
  const monthTotal=DATA.payments.filter(p=>monthKey(p.date)===mk).reduce((s,p)=>s+Number(p.amount),0);

function bindCustomerFormRadios(){
  document.querySelectorAll('#f_status_group .radio-opt').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('#f_status_group .radio-opt').forEach(x=>x.classList.remove('checked'));
      el.classList.add('checked');
    });
  });
}
function openCustomerModal(cust){
  openModal(cust?t('editCustomer'):t('addCustomer'),customerFormHtml(cust),`
    <button class="btn secondary" id="modalCancel">${esc(t('cancel'))}</button>
    <button class="btn" id="modalSave">${esc(t('save'))}</button>
  `);
  bindCustomerFormRadios();
  document.getElementById('modalCancel').addEventListener('click',closeModal);
  document.getElementById('modalSave').addEventListener('click',()=>{
    const name=document.getElementById('f_name').value.trim();
    if(!name)return;
    const status=document.querySelector('#f_status_group .checked').getAttribute('data-status');
    const obj={
      id:cust?cust.id:uid(),
      name,
      phone:document.getElementById('f_phone').value.trim(),
      conn:undefined,
      connNo:document.getElementById('f_conn').value.trim(),
      address:document.getElementById('f_address').value.trim(),
      areaId:document.getElementById('f_area').value,
      packageId:document.getElementById('f_package').value,
      status,
      openingBalance:Math.round(Number(document.getElementById('f_balance').value||0)),
      createdAt:cust?cust.createdAt:Date.now()
    };
    if(cust){Object.assign(cust,obj);}
    else{DATA.customers.push(obj);}
    saveData();closeModal();renderMain();
  });
}

function renderReports(){
  ensureReportFilters();
  const f=REPORT_FILTERS;
  const filtered=DATA.payments.filter(p=>{
    if(p.date<f.from||p.date>f.to)return false;
    if(f.employeeId&&p.employeeId!==f.employeeId)return false;
    if(f.areaId){const c=getCustomer(p.customerId);if(!c||c.areaId!==f.areaId)return false;}
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((s,p)=>s+Number(p.amount),0);
  return `
    <div class="page-head">
      <div><h1>${esc(t('reportsTitle'))}</h1></div>
      <button class="btn secondary no-print" id="printBtn">\uD83D\uDDA8 ${esc(t('print'))}</button>
    </div>
    <div class="filter-bar no-print">
      <div class="filter-item"><label>${esc(t('from'))}</label><input type="date" id="rf_from" value="${f.from}"></div>
      <div class="filter-item"><label>${esc(t('to'))}</label><input type="date" id="rf_to" value="${f.to}"></div>
      <div class="filter-item"><label>${esc(t('employeeFilter'))}</label>
        <select id="rf_emp"><option value="">${esc(t('allEmployees'))}</option>${DATA.employees.map(e=>`<option value="${e.id}" ${f.employeeId===e.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select>
      </div>
      <div class="filter-item"><label>${esc(t('areaFilter'))}</label>
        <select id="rf_area"><option value="">${esc(t('allAreas'))}</option>${DATA.areas.map(a=>`<option value="${a.id}" ${f.areaId===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="card card-pad" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div class="stat-label">${esc(t('totalCollected'))} \u2022 ${filtered.length} ${esc(t('entries'))}</div>
      <div class="stat-value">${fmtMoney(total)}</div>
    </div>
    <div class="card" style="overflow-x:auto;">
      ${filtered.length===0?`<div class="empty-state"><div class="big">\uD83D\uDCC4</div>${esc(t('noPayments'))}</div>`:`
      <table>
        <thead><tr><th>${esc(t('tblDate'))}</th><th>${esc(t('tblCustomer'))}</th><th>${esc(t('tblArea'))}</th><th>${esc(t('tblPackage'))}</th><th>${esc(t('tblEmployee'))}</th><th>${esc(t('tblMethod'))}</th><th>${esc(t('tblAmount'))}</th></tr></thead>
        <tbody>
          ${filtered.map(p=>{
            const c=getCustomer(p.customerId)||{};

            return `<tr><td>${fmtDate(p.date)}</td><td>${esc(c.name||'-')}</td><td>${esc(area?area.name:'-')}</td><td>${esc(pkg?pkg.name:'-')}</td><td>${esc(emp?emp.name:'-')}</td><td>${esc(p.method==='upi'?t('upi'):t('cash'))}</td><td>${fmtMoney(p.amount)}</td></tr>`;
          }).join('')}
        </tbody>
      </table>`}

  `;

        cust.openingBalance=Math.max(0,Number(cust.openingBalance)-amount);

      if(confirm(t('confirmDelete'))){DATA.tickets=DATA.tickets.filter(x=>x.id!==b.getAttribute('data-del-ticket'));saveData();renderMain();}

}

/* ---- Backup / Restore ---- */
function backupFileName(){return 'billing-backup-'+todayStr()+'.json';}
function downloadBackupFile(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=backupFileName();
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function sendBackupToDrive(){
  if(typeof sendPrompt!=='function')return;
  const payload=JSON.stringify(DATA);
  const msg='Please save this billing app backup to my connected Google Drive: create a JSON file named "'+backupFileName()+'" with the raw data below, and also create a Google Sheet listing the customers and payments from it.\n\n```json\n'+payload+'\n```';
  sendPrompt(msg);
}
function openRestoreModal(){
  openModal(t('restoreBackup'),`
    <div class="row-sub" style="margin-bottom:12px;">${esc(t('restoreHint'))}</div>
    <div class="field"><label>${esc(t('chooseFile'))}</label><input type="file" id="restoreFileInput" accept="application/json,.json"></div>
    <div class="field"><label>${esc(t('pasteBackupLabel'))}</label><textarea id="restoreTextArea" rows="6" style="font-family:var(--font-mono);font-size:12px;"></textarea></div>
  `,`<button class="btn secondary" id="modalCancel">${esc(t('cancel'))}</button><button class="btn" id="modalSave">${esc(t('restore'))}</button>`);
  document.getElementById('modalCancel').addEventListener('click',closeModal);
  document.getElementById('restoreFileInput').addEventListener('change',(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{document.getElementById('restoreTextArea').value=reader.result;};
    reader.readAsText(file);
  });
  document.getElementById('modalSave').addEventListener('click',()=>{
    const raw=document.getElementById('restoreTextArea').value.trim();
    if(!raw)return;
    let parsed;
    try{ parsed=JSON.parse(raw); }catch(e){ alert(t('restoreError')); return; }
    if(!parsed||typeof parsed!=='object'||!parsed.customers||!parsed.settings){ alert(t('restoreError')); return; }
    if(!confirm(t('restoreConfirm')))return;
    DATA=parsed;
    saveData();closeModal();render();
    alert(t('restoreSuccess'));
  });
}

    if(!q){box.innerHTML='';return;}

    box.innerHTML=matches.length?`<div class="suggest-list">${matches.map(c=>`<div class="suggest-item" data-tkpick="${c.id}"><strong>${esc(c.name)}</strong> \u2014 ${esc(c.phone||'')}</div>`).join('')}</div>`:`<div class="suggest-list"><div class="suggest-item">${esc(t('noResults'))}</div></div>`;
    document.querySelectorAll('[data-tkpick]').forEach(el=>el.addEventListener('click',()=>{
      TICKET_CUST_ID=el.getAttribute('data-tkpick');
      const c=getCustomer(TICKET_CUST_ID);
      document.getElementById('tk_selectedName').textContent=c.name;
      document.getElementById('tk_selectedWrap').style.display='block';
      search.value='';box.innerHTML='';
    }));
  });
  document.getElementById('modalSave').addEventListener('click',()=>{
    if(!TICKET_CUST_ID){alert(t('selectCustomerFirst'));return;}
    DATA.tickets.push({
      id:uid(),customerId:TICKET_CUST_ID,type:document.getElementById('tk_type').value,
      employeeId:document.getElementById('tk_emp').value,desc:document.getElementById('tk_desc').value.trim(),
      status:'open',date:todayStr(),createdAt:Date.now()
    });
    saveData();closeModal();renderMain();
  });
}

function findAreaByName(name){
  const n=name.trim().toLowerCase();
  return DATA.areas.find(a=>a.name.trim().toLowerCase()===n);
}
function findPackageByName(name){
  const n=name.trim().toLowerCase();
  return DATA.packages.find(p=>p.name.trim().toLowerCase()===n);
}
function bulkImportCore(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  let added=0,skipped=0,newAreas=0,newPackages=0;
  lines.forEach(line=>{
    const parts=line.split('|').map(p=>p.trim());
    const name=parts[0]||'';
    if(!name)return;
    const phone=parts[1]||'';
    const address=parts[2]||'';
    const areaName=parts[3]||'';
    const packageName=parts[4]||'';
    const connNo=parts[5]||'';
    const balanceRaw=parts[6]||'';
    const openingBalance=balanceRaw?(Number(balanceRaw)||0):0;
    const statusRaw=(parts[7]||'').trim().toLowerCase();
    const status=statusRaw.startsWith('inactive')?'inactive':'active';

    const dup=connNo
      ? DATA.customers.find(c=>c.connNo&&c.connNo.trim().toLowerCase()===connNo.trim().toLowerCase())
      : DATA.customers.find(c=>c.name.trim().toLowerCase()===name.toLowerCase()&&(phone?c.phone===phone:true));
    if(dup){skipped++;return;}

    let areaId='';
    if(areaName){
      let area=findAreaByName(areaName);
      if(!area){area={id:uid(),name:areaName};DATA.areas.push(area);newAreas++;}
      areaId=area.id;
    }
    let packageId='';
    if(packageName){
      let pkg=findPackageByName(packageName);
      if(!pkg){pkg={id:uid(),name:packageName,type:'cable',price:0};DATA.packages.push(pkg);newPackages++;}
      packageId=pkg.id;
    }
    DATA.customers.push({id:uid(),name,phone,address,areaId,packageId,connNo,status,openingBalance,createdAt:Date.now()});
    added++;
  });
  return{added,skipped,newAreas,newPackages};
}
function runBulkImport(raw){
  const r=bulkImportCore(raw);
  if(r.added===0&&r.skipped===0){alert(t('noValidLines'));return;}
  saveData();closeModal();renderMain();
  let msg=t('importDone')+'\n'+r.added+' '+t('customersToAdd');
  if(r.newAreas>0)msg+='\n'+r.newAreas+' '+t('newAreasWillBeCreated');
  if(r.newPackages>0)msg+='\n'+r.newPackages+' '+t('newPackagesWillBeCreated');
  if(r.skipped>0)msg+='\n'+r.skipped+' '+t('skippedDuplicates');
  alert(msg);
}

function bulkPkgImportCore(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  let added=0,skipped=0;
  lines.forEach(line=>{
    const parts=line.split('|').map(p=>p.trim());
    const name=parts[0]||'';
    if(!name)return;
    let type=(parts[1]||'').toLowerCase();
    if(type!=='cable'&&type!=='internet'&&type!=='combo')type='cable';
    const price=Number(parts[2]||0)||0;
    const dup=findPackageByName(name);
    if(dup){skipped++;return;}
    DATA.packages.push({id:uid(),name,type,price});
    added++;
  });
  return{added,skipped};
}
function runBulkPkgImport(raw){
  const r=bulkPkgImportCore(raw);
  if(r.added===0&&r.skipped===0){alert(t('noValidPkgLines'));return;}
  saveData();closeModal();renderMain();
  let msg=r.added+' '+t('pkgsToAdd');
  if(r.skipped>0)msg+='\n'+r.skipped+' '+t('pkgsSkipped');
  alert(msg);
}
